// ── UTILS ──────────────────────────────────────────────────────────────────
const sum  = (arr,k) => arr.reduce((a,b)=>a+(b[k]||0),0);
const fmt  = (n,d=1) => n>=1000 ? `₦${(n/1000).toFixed(d)}B` : `₦${(+n).toFixed(d)}M`;
const pct  = n => `${(+n).toFixed(2)}%`;
const TP   = {background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.t1,fontSize:12};

// ── ECL ENGINE ─────────────────────────────────────────────────────────────
const PD = {1:{pd12:.02,pdL:.05,lgd:.45},2:{pd12:.15,pdL:.35,lgd:.55},3:{pd12:.75,pdL:.90,lgd:.65}};
function calcECL(loans, pdMult=1) {
  return loans.map(l => {
    const p  = PD[l.stage];
    const pd = (l.stage===1 ? p.pd12 : p.pdL) * pdMult;
    const ecl = pd * p.lgd * l.outstanding;
    return {...l, pd:+pd.toFixed(4), lgd:p.lgd, ead:l.outstanding, ecl:+ecl.toFixed(2), eclRate:+(ecl/l.outstanding*100).toFixed(2)};
  });
}

// ── SHARED COMPONENTS ──────────────────────────────────────────────────────
function StageBadge({stage}) {
  const cfg = {1:[C.green,"#0d2b23"],2:[C.gold,"#2b200a"],3:[C.red,"#2b0d12"]};
  const [col,bg] = cfg[stage]||[C.t2,C.card];
  return <span style={{color:col,background:bg,border:`1px solid ${col}40`,padding:"2px 8px",borderRadius:4,fontSize:11,fontFamily:"IBM Plex Mono,monospace",fontWeight:600}}>Stage {stage}</span>;
}

function KpiCard({label,value,sub,color=C.teal,delta}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 20px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:color,borderRadius:"10px 0 0 10px"}}/>
      <div style={{color:C.t2,fontSize:10,fontFamily:"IBM Plex Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{label}</div>
      <div style={{color:C.t1,fontSize:22,fontWeight:700,fontFamily:"IBM Plex Mono,monospace",letterSpacing:"-0.02em"}}>{value}</div>
      {sub && <div style={{color:C.t3,fontSize:11,marginTop:4}}>{sub}</div>}
      {delta!==undefined && <div style={{color:delta>=0?C.green:C.red,fontSize:10,marginTop:4,fontFamily:"IBM Plex Mono,monospace"}}>{delta>=0?"▲":"▼"} {Math.abs(delta).toFixed(1)}% MoM</div>}
    </div>
  );
}

function SectionHead({title,sub}) {

function Card({children,style={}}) {

}

function CardLabel({children}) {
  return <div style={{color:C.t2,fontSize:10,fontFamily:"IBM Plex Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>{children}</div>;
}

function DataTable({cols,rows,compact=false}) {
  const fs = compact?11:12, py = compact?7:10, px = compact?10:12;
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:fs}}>

const PALETTE = [C.teal,C.blue,C.purple,C.gold,C.green,C.red];

// ── MODULE: DASHBOARD ──────────────────────────────────────────────────────
function Dashboard() {
  const eclLoans   = useMemo(()=>calcECL(LOANS),[]);
  const totalCash  = sum(CASH.filter(a=>a.currency==="NGN"),"balance");
  const totalLoans = sum(LOANS,"outstanding");
  const totalECL   = sum(eclLoans,"ecl");
  const totalDebt  = sum(BORROWINGS,"outstanding");
  const totalInv   = sum(INVESTMENTS,"principal");
  const netLiq     = totalCash+totalInv-totalDebt*0.1;

  const stageData = useMemo(()=>[1,2,3].map(s=>{
    const sl = eclLoans.filter(l=>l.stage===s);
    return {name:`Stage ${s}`,value:sum(sl,"outstanding"),ecl:sum(sl,"ecl"),count:sl.length,fill:[C.green,C.gold,C.red][s-1]};
  }),[eclLoans]);

  const prodData = useMemo(()=>{
    const m={};
    LOANS.forEach(l=>{m[l.product]=(m[l.product]||0)+l.outstanding});
    return Object.entries(m).map(([name,value])=>({name,value}));
  },[]);

  const matData = useMemo(()=>{
    const now=new Date("2024-06-01"),b={"0-30d":0,"31-60d":0,"61-90d":0,"91-180d":0,">180d":0};
    LOANS.forEach(l=>{
      const d=Math.max(0,(new Date(l.maturity)-now)/86400000);
      if(d<=30)b["0-30d"]+=l.outstanding;
      else if(d<=60)b["31-60d"]+=l.outstanding;
      else if(d<=90)b["61-90d"]+=l.outstanding;
      else if(d<=180)b["91-180d"]+=l.outstanding;
      else b[">180d"]+=l.outstanding;
    });
    return Object.entries(b).map(([period,loans])=>({period,loans}));
  },[]);

  return (
    <div className="fade-in">
      <SectionHead title="Executive Dashboard" sub="Consolidated treasury & credit position — 01 June 2024" />
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>
        <KpiCard label="Total Cash"         value={fmt(totalCash)}  sub="Across 6 accounts"               color={C.teal}   delta={2.4}/>
        <KpiCard label="Net Liquidity"      value={fmt(netLiq)}     sub="Cash + Investments − Obligations" color={C.blue}   delta={1.8}/>
        <KpiCard label="Loan Book"          value={fmt(totalLoans)} sub="15 active facilities"             color={C.green}  delta={4.2}/>
        <KpiCard label="ECL Provision"      value={fmt(totalECL)}   sub={`Coverage: ${pct(totalECL/totalLoans*100)}`} color={C.gold} delta={8.6}/>
        <KpiCard label="Total Borrowings"   value={fmt(totalDebt)}  sub="6 facilities"                    color={C.purple} delta={-1.2}/>
        <KpiCard label="Investment Portfolio" value={fmt(totalInv)} sub="Avg yield: 20.9%"                color={C.teal}   delta={3.1}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <Card>
          <CardLabel>Cash Position Trend (₦M)</CardLabel>
          <ResponsiveContainer width="100%" height={180}>
            <AreaChart data={CASH_TREND}>
              <defs><linearGradient id="cg1" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.teal} stopOpacity={0.3}/><stop offset="95%" stopColor={C.teal} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
              <XAxis dataKey="m" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={TP}/>
              <Area type="monotone" dataKey="v" name="Cash" stroke={C.teal} strokeWidth={2} fill="url(#cg1)" dot={{fill:C.teal,r:3}}/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <CardLabel>Loan Stage Distribution (₦M)</CardLabel>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <ResponsiveContainer width="50%" height={180}>
              <PieChart>
                <Pie data={stageData} cx="50%" cy="50%" innerRadius={50} outerRadius={75} paddingAngle={3} dataKey="value">
                  {stageData.map((s,i)=><Cell key={i} fill={s.fill}/>)}
                </Pie>
                <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
              </PieChart>
            </ResponsiveContainer>
            <div style={{flex:1}}>
              {stageData.map((s,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.border}30`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:2,background:s.fill}}/>
                    <span style={{color:C.t2,fontSize:11}}>{s.name}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:C.t1,fontFamily:"IBM Plex Mono,monospace",fontSize:12}}>{fmt(s.value)}</div>
                    <div style={{color:C.t3,fontSize:10}}>ECL: {fmt(s.ecl)}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <Card>
          <CardLabel>Portfolio by Product (₦M)</CardLabel>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={prodData} layout="vertical">
              <CartesianGrid stroke={C.border} strokeDasharray="3 3" horizontal={false}/>
              <XAxis type="number" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis type="category" dataKey="name" tick={{fill:C.t2,fontSize:10}} axisLine={false} tickLine={false} width={130}/>
              <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
              <Bar dataKey="value" radius={[0,4,4,0]}>
                {prodData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <CardLabel>Loan Maturity Ladder (₦M)</CardLabel>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={matData}>
              <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>

                {matData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </Card>
      </div>
    </div>
  );
}

// ── MODULE: LOANS ──────────────────────────────────────────────────────────
function Loans() {
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const filtered=useMemo(()=>{
    let l=LOANS;
    if(filter!=="all") l=l.filter(x=>x.stage===+filter);
    if(search) l=l.filter(x=>x.customer.toLowerCase().includes(search.toLowerCase())||x.id.toLowerCase().includes(search.toLowerCase()));
    return l;
  },[filter,search]);

  const total=sum(LOANS,"outstanding");
  const npl=LOANS.filter(l=>l.dpd>=90);
  const aging=[
    {b:"Current",v:sum(LOANS.filter(l=>l.dpd===0),"outstanding")},
    {b:"1-30d",  v:sum(LOANS.filter(l=>l.dpd>0&&l.dpd<=30),"outstanding")},
    {b:"31-60d", v:sum(LOANS.filter(l=>l.dpd>30&&l.dpd<=60),"outstanding")},
    {b:"61-90d", v:sum(LOANS.filter(l=>l.dpd>60&&l.dpd<=90),"outstanding")},
    {b:"91-180d",v:sum(LOANS.filter(l=>l.dpd>90&&l.dpd<=180),"outstanding")},
    {b:">180d",  v:sum(LOANS.filter(l=>l.dpd>180),"outstanding")},
  ];
  const bstyle=(active)=>({background:active?C.teal:"transparent",color:active?"#000":C.t2,border:`1px solid ${active?C.teal:C.border}`,borderRadius:6,padding:"6px 14px",fontSize:11,cursor:"pointer",fontFamily:"IBM Plex Mono,monospace",fontWeight:600});
  const cols=[
    {key:"id",label:"Loan ID",mono:true,color:()=>C.teal},
    {key:"customer",label:"Customer"},

// ── MODULE: ECL ────────────────────────────────────────────────────────────
function ECLModule() {
  const [pdAdj,setPdAdj]=useState(0);
  const eclLoans=useMemo(()=>calcECL(LOANS,1+pdAdj/100),[pdAdj]);
  const totalECL=sum(eclLoans,"ecl");
  const totalEAD=sum(eclLoans,"ead");
  const coverage=totalECL/totalEAD*100;
  const stageStats=[1,2,3].map(s=>{const sl=eclLoans.filter(l=>l.stage===s);return{stage:s,count:sl.length,ead:sum(sl,"ead"),ecl:sum(sl,"ecl")};});

  const cols=[
    {key:"id",label:"Loan ID",mono:true,color:()=>C.teal},
    {key:"customer",label:"Customer"},
    {key:"stage",label:"Stage",render:r=><StageBadge stage={r.stage}/>},
    {key:"ead",label:"EAD (₦M)",align:"right",mono:true,render:r=>fmt(r.ead)},
    {key:"pd",label:"PD",align:"right",mono:true,render:r=>pct(r.pd*100),color:r=>r.pd>.5?C.red:r.pd>.1?C.gold:C.green},
    {key:"lgd",label:"LGD",align:"right",mono:true,render:r=>pct(r.lgd*100)},
    {key:"ecl",label:"ECL (₦M)",align:"right",mono:true,render:r=>fmt(r.ecl),color:r=>r.ecl>50?C.red:r.ecl>20?C.gold:C.green},
    {key:"eclRate",label:"ECL Rate",align:"right",mono:true,render:r=>`${r.eclRate}%`,color:r=>r.eclRate>50?C.red:r.eclRate>15?C.gold:C.teal},
  ];

  return (
    <div className="fade-in">
      <SectionHead title="Expected Credit Loss (ECL) Model" sub="IFRS 9 compliant · Stage 1: 12-month ECL · Stage 2 & 3: Lifetime ECL"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        <KpiCard label="Total ECL Provision" value={fmt(totalECL)}              color={C.gold}/>
        <KpiCard label="Coverage Ratio"      value={pct(coverage)}             sub="ECL / EAD" color={C.teal}/>
        <KpiCard label="Stage 2 Exposure"    value={fmt(stageStats[1].ead)}    sub={`${stageStats[1].count} loans`} color={C.gold}/>
        <KpiCard label="Stage 3 Exposure"    value={fmt(stageStats[2].ead)}    sub={`${stageStats[2].count} loans`} color={C.red}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <Card>
          <CardLabel>ECL Provision Trend (₦M)</CardLabel>
          <ResponsiveContainer width="100%" height={160}>
            <LineChart data={ECL_TREND}>
              <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
              <XAxis dataKey="m" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="l" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="r" orientation="right" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={TP}/>
              <Legend wrapperStyle={{fontSize:10,color:C.t2}}/>
              <Line yAxisId="l" type="monotone" dataKey="prov" stroke={C.gold}  strokeWidth={2} dot={{fill:C.gold,r:3}}  name="Provision (₦M)"/>
              <Line yAxisId="r" type="monotone" dataKey="cov"  stroke={C.teal}  strokeWidth={2} dot={{fill:C.teal,r:3}}  name="Coverage %" strokeDasharray="5 5"/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <CardLabel>Stage Distribution</CardLabel>
          {stageStats.map((s,i)=>{
            const p=s.ead/totalEAD*100,cols=[C.green,C.gold,C.red];
            return (
              <div key={i} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:C.t2,fontSize:11}}>Stage {s.stage} ({s.count} loans)</span>
                  <span style={{color:cols[i],fontFamily:"IBM Plex Mono,monospace",fontSize:11}}>{fmt(s.ead)} · ECL: {fmt(s.ecl)}</span>
                </div>
                <div style={{background:C.navy,borderRadius:4,height:8,overflow:"hidden"}}>
                  <div style={{width:`${p}%`,height:"100%",background:cols[i],borderRadius:4,transition:"width 0.6s ease"}}/>
                </div>
                <div style={{color:C.t3,fontSize:10,marginTop:2,fontFamily:"IBM Plex Mono,monospace"}}>{p.toFixed(1)}% of portfolio</div>
              </div>
            );
          })}
          <div style={{marginTop:16,borderTop:`1px solid ${C.border}`,paddingTop:14}}>
            <div style={{color:C.t2,fontSize:11,marginBottom:8}}>PD Stress Test — Scenario Analysis</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>

            </div>
          </div>
        </Card>
      </div>
      <Card style={{marginBottom:16}}>
        <CardLabel>Credit Risk Heatmap — EAD vs ECL per Facility (₦M)</CardLabel>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={eclLoans.map(l=>({name:l.customer.split(" ")[0],ead:l.ead,ecl:l.ecl}))}>
            <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
            <XAxis dataKey="name" tick={{fill:C.t3,fontSize:9}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
            <Legend wrapperStyle={{fontSize:10,color:C.t2}}/>
            <Bar dataKey="ead" name="EAD" fill={C.blue}  opacity={0.5} radius={[2,2,0,0]}/>
            <Bar dataKey="ecl" name="ECL" fill={C.gold}  radius={[2,2,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>
      <Card>
        <CardLabel>Loan-level ECL Schedule</CardLabel>
        <DataTable cols={cols} rows={eclLoans} compact/>
        <div style={{marginTop:12,padding:"10px 0",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
          <span style={{color:C.t2,fontSize:11,fontFamily:"IBM Plex Mono,monospace"}}>TOTAL ECL PROVISION</span>
          <span style={{color:C.gold,fontSize:14,fontFamily:"IBM Plex Mono,monospace",fontWeight:700}}>{fmt(totalECL)}</span>
        </div>

// ── MODULE: BORROWINGS ─────────────────────────────────────────────────────
function Borrowings() {
  const total=sum(BORROWINGS,"outstanding");
  const wacd=BORROWINGS.reduce((a,b)=>a+(b.outstanding/total)*b.rate,0);
  const matData=useMemo(()=>{
    const now=new Date("2024-06-01");
    return BORROWINGS.map(b=>({lender:b.lender.split(" ")[0],outstanding:b.outstanding,days:Math.max(0,Math.round((new Date(b.maturity)-now)/86400000))})).sort((a,b)=>a.days-b.days);
  },[]);
  const typeData=useMemo(()=>{const m={};BORROWINGS.forEach(b=>{m[b.type]=(m[b.type]||0)+b.outstanding});return Object.entries(m).map(([name,value])=>({name,value}));},[]);
  const cols=[
    {key:"id",label:"ID",mono:true,color:()=>C.teal},
    {key:"lender",label:"Lender"},
    {key:"type",label:"Type",color:()=>C.t2},
    {key:"outstanding",label:"Outstanding (₦M)",align:"right",mono:true,render:r=>fmt(r.outstanding)},
    {key:"rate",label:"Rate",align:"right",mono:true,render:r=>`${r.rate}%`,color:r=>r.rate>20?C.red:r.rate>16?C.gold:C.green},
    {key:"tenor",label:"Tenor",align:"right",mono:true,render:r=>`${r.tenor}mo`},
    {key:"repayment",label:"Repayment",color:()=>C.t2},
    {key:"maturity",label:"Maturity",mono:true,color:()=>C.t2},
  ];
  return (
    <div className="fade-in">
      <SectionHead title="Borrowings Management" sub="Debt facilities · Cost of funds analysis"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        <KpiCard label="Total Debt"      value={fmt(total)}               color={C.purple}/>
        <KpiCard label="WACD"            value={pct(wacd)}                sub="Weighted avg. cost of debt" color={C.gold}/>
        <KpiCard label="Facilities"      value={BORROWINGS.length}        sub="Active borrowings"          color={C.teal}/>
        <KpiCard label="Interco. Debt"   value={fmt(BORROWINGS.find(b=>b.type==="Intercompany Loan")?.outstanding||0)} sub="Pan-African Holdings" color={C.blue}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <Card>
          <CardLabel>Debt Maturity Profile (₦M) — colour by time to maturity</CardLabel>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={matData}>
              <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
              <XAxis dataKey="lender" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
              <Bar dataKey="outstanding" name="Outstanding" radius={[4,4,0,0]}>
                {matData.map((d,i)=><Cell key={i} fill={d.days<180?C.red:d.days<360?C.gold:C.teal}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:14,marginTop:10}}>
            {[["< 180d",C.red],["180-360d",C.gold],["> 360d",C.teal]].map(([l,col])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:2,background:col}}/><span style={{color:C.t3,fontSize:10}}>{l}</span></div>
            ))}

        <Card>
          <CardLabel>Debt by Facility Type</CardLabel>

              <Pie data={typeData} cx="50%" cy="50%" outerRadius={75} paddingAngle={3} dataKey="value">
                {typeData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}

              <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>

// ── MODULE: INVESTMENTS ────────────────────────────────────────────────────
function Investments() {
  const total=sum(INVESTMENTS,"principal");
  const interest=useMemo(()=>INVESTMENTS.reduce((a,inv)=>a+inv.principal*(inv.rate/100)*(inv.days/365),0),[]);
  const avgYield=INVESTMENTS.reduce((a,inv)=>a+(inv.principal/total)*inv.rate,0);
  const typeData=useMemo(()=>{const m={};INVESTMENTS.forEach(i=>{m[i.type]=(m[i.type]||0)+i.principal});return Object.entries(m).map(([name,value])=>({name,value}));},[]);
  const matData=INVESTMENTS.map(i=>({cp:i.counterparty.split(" ")[0],principal:i.principal,interest:+(i.principal*(i.rate/100)*(i.days/365)).toFixed(2)}));
  const cols=[
    {key:"id",label:"ID",mono:true,color:()=>C.teal},
    {key:"counterparty",label:"Counterparty"},
    {key:"type",label:"Type",color:()=>C.t2},
    {key:"principal",label:"Principal (₦M)",align:"right",mono:true,render:r=>fmt(r.principal)},

    {key:"int",label:"Interest (₦M)",align:"right",mono:true,render:r=>fmt(r.principal*(r.rate/100)*(r.days/365)),color:()=>C.gold},

  return (
    <div className="fade-in">
      <SectionHead title="Investment Portfolio" sub="Treasury placements · Yield analysis"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        <KpiCard label="Portfolio Value"  value={fmt(total)}         color={C.teal}/>
        <KpiCard label="Projected Interest" value={fmt(interest)}   sub="Full tenor"       color={C.gold}/>

        <Card>
          <CardLabel>Investment Maturity Ladder — Principal + Interest (₦M)</CardLabel>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={matData}>
              <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
              <XAxis dataKey="cp" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
              <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
              <Legend wrapperStyle={{fontSize:10,color:C.t2}}/>
              <Bar dataKey="principal" name="Principal" fill={C.teal}  stackId="a"/>
              <Bar dataKey="interest"  name="Interest"  fill={C.gold}  stackId="a" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <CardLabel>Portfolio Mix</CardLabel>
          <ResponsiveContainer width="100%" height={180}>
            <PieChart>
              <Pie data={typeData} cx="50%" cy="50%" outerRadius={75} paddingAngle={3} dataKey="value">
                {typeData.map((_,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}
              </Pie>
              <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
              <Legend wrapperStyle={{fontSize:10,color:C.t2}}/>

        </Card>

// ── MODULE: LIQUIDITY ──────────────────────────────────────────────────────
function Liquidity() {
  const totalCash=sum(CASH.filter(a=>a.currency==="NGN"),"balance");
  const totalInv=sum(INVESTMENTS,"principal");
  const totalDebt=sum(BORROWINGS,"outstanding");
  const totalLoans=sum(LOANS,"outstanding");
  const netLiq=totalCash+totalInv-totalDebt*0.1;
  const liqRatio=(totalCash+totalInv)/(totalDebt*0.2+totalLoans*0.1)*100;

  return (
    <div className="fade-in">
      <SectionHead title="Liquidity Management" sub="Net liquidity position · Cash flow forecast · Gap analysis"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        <KpiCard label="Net Liquidity"    value={fmt(netLiq)}                     color={C.teal}  delta={2.1}/>
        <KpiCard label="Liquidity Ratio"  value={pct(liqRatio)}                  sub="Liquid assets / obligations" color={C.green}/>
        <KpiCard label="30d Forecast"     value={fmt(LIQ_FORECAST[1].cum)}       sub="Projected balance"  color={C.blue}/>
        <KpiCard label="90d Gap"          value={fmt(LIQ_FORECAST[3].net)}       sub={LIQ_FORECAST[3].net<0?"Deficit":"Surplus"} color={LIQ_FORECAST[3].net<0?C.red:C.green}/>
      </div>
      <Card style={{marginBottom:16}}>
        <CardLabel>180-Day Liquidity Forecast — Net Flow & Cumulative Position (₦M)</CardLabel>
        <ResponsiveContainer width="100%" height={220}>
          <ComposedChart data={LIQ_FORECAST}>
            <defs><linearGradient id="liqG" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.blue} stopOpacity={0.3}/><stop offset="95%" stopColor={C.blue} stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
            <XAxis dataKey="p" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
            <Legend wrapperStyle={{fontSize:10,color:C.t2}}/>
            <ReferenceLine y={0} stroke={C.border} strokeDasharray="4 4"/>
            <Bar dataKey="net" name="Net Flow" fill={C.teal} radius={[2,2,0,0]} opacity={0.7}/>
            <Area type="monotone" dataKey="cum" name="Cumulative" stroke={C.blue} strokeWidth={2} fill="url(#liqG)" dot={{fill:C.blue,r:3}}/>
          </ComposedChart>
        </ResponsiveContainer>
      </Card>
      <Card style={{marginBottom:16}}>
        <CardLabel>Liquidity Gap Analysis — Inflows vs. Outflows by Period (₦M)</CardLabel>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={GAP_DATA}>
            <CartesianGrid stroke={C.border} strokeDasharray="3 3"/>
            <XAxis dataKey="p" tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:C.t3,fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip contentStyle={TP} formatter={v=>fmt(v)}/>
            <Legend wrapperStyle={{fontSize:10,color:C.t2}}/>
            <Bar dataKey="in"  name="Inflows"  fill={C.green} radius={[4,4,0,0]}/>
            <Bar dataKey="out" name="Outflows" fill={C.red}   radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <Card>
          <CardLabel>Liquidity Sources</CardLabel>
          {[
            {label:"Unrestricted Cash",value:sum(CASH.filter(a=>!a.restricted&&a.currency==="NGN"),"balance"),color:C.teal},
            {label:"Investment Maturities (<90d)",value:sum(INVESTMENTS.filter(i=>i.days<=90),"principal"),color:C.blue},
            {label:"Loan Collections (est.)",value:totalLoans*0.12,color:C.green},
          ].map((item,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}30`}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:3,height:16,background:item.color,borderRadius:2}}/>
                <span style={{color:C.t2,fontSize:12}}>{item.label}</span>
              </div>
              <span style={{color:item.color,fontFamily:"IBM Plex Mono,monospace",fontSize:13,fontWeight:600}}>{fmt(item.value)}</span>
            </div>
          ))}
        </Card>
        <Card>
          <CardLabel>Liquidity Obligations</CardLabel>
          {[
            {label:"Debt Due (<90d)",value:sum(BORROWINGS.filter(b=>b.type!=="Intercompany Loan"),"outstanding")*0.15,color:C.red},
            {label:"Operational Expenses",value:45,color:C.gold},
            {label:"Funding Commitments",value:120,color:C.purple},
          ].map((item,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}30`}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:3,height:16,background:item.color,borderRadius:2}}/>
                <span style={{color:C.t2,fontSize:12}}>{item.label}</span>
              </div>
              <span style={{color:item.color,fontFamily:"IBM Plex Mono,monospace",fontSize:13,fontWeight:600}}>{fmt(item.value)}</span>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

// ── UPLOAD MODAL ───────────────────────────────────────────────────────────
function UploadModal({onClose,module}) {
  const [step,setStep]=useState("idle");
  const [rows,setRows]=useState([]);
  const handleFile=useCallback(e=>{
    if(!e.target.files[0]) return;
    setStep("validating");
    setTimeout(()=>{
      setRows([
        {s:"✓",r:1,d:"Row validated successfully"},
        {s:"✓",r:2,d:"Row validated successfully"},
        {s:"⚠",r:3,d:"Warning: Rate field missing — defaulted to 0%"},
      ]);
      setStep("preview");
    },1100);
  },[]);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:C.card,border:`1px solid ${C.borderL}`,borderRadius:14,padding:28,width:460,boxShadow:"0 24px 64px rgba(0,0,0,0.5)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <div style={{color:C.t1,fontWeight:700,fontSize:15}}>Upload {module}</div>
            <div style={{color:C.t3,fontSize:11,fontFamily:"IBM Plex Mono,monospace",marginTop:2}}>CSV / Excel (.xlsx) supported</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:C.t2,cursor:"pointer",fontSize:20,lineHeight:1}}>✕</button>
        </div>
        {step==="idle" && (
          <label className="upload-zone" style={{display:"block",border:`2px dashed ${C.border}`,borderRadius:10,padding:32,textAlign:"center",cursor:"pointer",transition:"border-color 0.2s"}}>
            <div style={{fontSize:36,marginBottom:10}}>📂</div>
            <div style={{color:C.t1,fontSize:13,marginBottom:4}}>Drop file or click to browse</div>
            <div style={{color:C.t3,fontSize:11}}>Max 5MB · CSV or XLSX</div>
            <input type="file" accept=".csv,.xlsx" onChange={handleFile} style={{display:"none"}}/>
          </label>
        )}
        {step==="validating" && (
          <div style={{textAlign:"center",padding:36}}>
            <div style={{color:C.teal,fontSize:28,marginBottom:10}}>⟳</div>
            <div style={{color:C.t2,fontSize:13}}>Validating and parsing data…</div>
          </div>
        )}
        {step==="preview" && (
          <div>
            <div style={{background:C.navy,borderRadius:8,padding:16,marginBottom:16,maxHeight:160,overflowY:"auto"}}>
              {rows.map((r,i)=>(
                <div key={i} style={{display:"flex",gap:12,padding:"5px 0",borderBottom:`1px solid ${C.border}20`,fontSize:11}}>
                  <span style={{color:r.s==="✓"?C.green:C.gold,fontFamily:"IBM Plex Mono,monospace"}}>{r.s}</span>
                  <span style={{color:C.t3,fontFamily:"IBM Plex Mono,monospace"}}>Row {r.r}</span>
                  <span style={{color:C.t2}}>{r.d}</span>
                </div>
              ))}
            </div>
            <button onClick={()=>{setStep("done");setTimeout(onClose,1500);}} style={{width:"100%",background:C.teal,color:"#000",border:"none",borderRadius:8,padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"IBM Plex Mono,monospace"}}>Confirm Import</button>
          </div>
        )}
        {step==="done" && (
          <div style={{textAlign:"center",padding:28}}>
            <div style={{fontSize:36,marginBottom:10}}>✅</div>
            <div style={{color:C.green,fontSize:13}}>Data imported successfully</div>
          </div>
        )}
      </div>
    </div>
  );
}
